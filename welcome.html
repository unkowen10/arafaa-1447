<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1419">
<title>يوم عرفة 1447هـ - أهلاً وسهلاً</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --gold: #d4af37;
  --gold-light: #f3e5ab;
  --text: #e6e6e6;
  --text-muted: #a0a0a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  overflow: hidden;
}

/* Islamic geometric overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(212,175,55,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(45,106,79,0.12) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
}

.welcome-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  text-align: center;
}

/* Top decorative line */
.deco-line {
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0 auto 2rem;
  border-radius: 2px;
  opacity: .8;
  animation: expandLine 1.2s ease-out forwards;
}

@keyframes expandLine {
  from { width: 0; opacity: 0; }
  to   { width: 80px; opacity: .8; }
}

/* Greeting */
.greeting {
  font-family: 'Amiri', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  color: var(--gold-light);
  line-height: 1.6;
  margin-bottom: .6rem;
  opacity: 0;
  animation: fadeInUp .8s .4s ease forwards;
}

.sub-greeting {
  font-family: 'Reem Kufi', sans-serif;
  font-size: clamp(1.1rem, 3.5vw, 1.5rem);
  color: var(--text-muted);
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeInUp .8s .7s ease forwards;
}

/* Dua card */
.dua-card {
  max-width: 680px;
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 20px;
  padding: 2rem 1.8rem;
  margin-bottom: 2.5rem;
  position: relative;
  opacity: 0;
  animation: fadeInUp .9s 1s ease forwards;
  box-shadow: 0 10px 40px rgba(0,0,0,0.35);
}

.dua-card::before,
.dua-card::after {
  content: '❝';
  position: absolute;
  font-size: 2.5rem;
  color: var(--gold);
  opacity: .2;
  line-height: 1;
}
.dua-card::before { top: 10px; right: 14px; }
.dua-card::after  { content: '❞'; bottom: 6px; left: 14px; }

.dua-text {
  font-family: 'Amiri', serif;
  font-size: clamp(1.15rem, 3.5vw, 1.6rem);
  color: var(--gold-light);
  line-height: 2;
  text-align: center;
}

/* Enter button */
.enter-btn {
  display: inline-flex;
  align-items: center;
  gap: .6rem;
  padding: .9rem 2.4rem;
  border-radius: 999px;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
  color: var(--gold-light);
  font-family: 'Tajawal', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  transition: all .25s ease;
  opacity: 0;
  animation: fadeInUp .8s 1.4s ease forwards;
}

.enter-btn:hover {
  background: var(--gold);
  color: #0a0e14;
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(212,175,55,0.25);
}

/* Floating particles (small CSS-only decoration) */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--gold);
  border-radius: 50%;
  opacity: .35;
  animation: float 8s infinite ease-in-out;
}
.particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
.particle:nth-child(2) { left: 80%; top: 15%; animation-delay: 2s; }
.particle:nth-child(3) { left: 50%; top: 80%; animation-delay: 4s; }
.particle:nth-child(4) { left: 25%; top: 60%; animation-delay: 1s; }
.particle:nth-child(5) { left: 70%; top: 45%; animation-delay: 3s; }
.particle:nth-child(6) { left: 90%; top: 85%; animation-delay: 5s; }

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); opacity: .2; }
  50%      { transform: translateY(-30px) scale(1.4); opacity: .5; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 480px) {
  .dua-card { padding: 1.5rem 1.2rem; }
  .enter-btn { padding: .8rem 1.8rem; font-size: 1rem; }
}
</style>
</head>
<body>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="welcome-wrap">
    <div class="deco-line"></div>

    <div class="greeting">
      السلام عليكم ورحمة الله وبركاته
    </div>
    <div class="sub-greeting">
      تقبل الله منا ومنكم صالح الأعمال
    </div>

    <div class="dua-card">
      <div class="dua-text">
        اللهم اغفر لي ولصاحب هذا العمل<br>
        واجعلنا من أهل الجنة نحن وأهلنا<br>
        ونجنا من النار
      </div>
    </div>

    <a href="features.html" class="enter-btn" id="enterBtn" onclick="markVisited()">
      🤲 دخول الموقع
    </a>
  </div>

<script>
  function markVisited() {
    try { localStorage.setItem('arafah1447_welcome_seen', '1'); } catch(e){}
  }
  // Optional: auto-enter after 8 seconds if user is idle
  let autoTimer = setTimeout(function(){
    markVisited();
    window.location.href = 'features.html';
  }, 12000);
  // Cancel auto-enter if user clicks anywhere
  document.addEventListener('click', function(){ clearTimeout(autoTimer); }, {once:true});
</script>
</body>
</html>
